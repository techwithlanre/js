<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Types</title>
</head>
<body>
    <script>
        /* 
        - **String**: Represents a sequence of characters, enclosed in either single or double quotes. Example: `"Hello, world!"`.
        - **Number**: Represents numeric values, including integers and floating-point numbers. Example: `42` or `3.14`.
        - **Boolean**: Represents a logical value, either `true` or `false`. Example: `true`.
        - **Array**: Represents an ordered collection of values, enclosed in square brackets `[]`. Example: `["apple", "banana", "orange"]`.
        - **Object**: Represents a collection of key-value pairs, enclosed in curly braces `{}`. Example: `{ name: "John", age: 25 }`.
        - **Null**: Represents the intentional absence of any object value. Example: `null`.
        - **Undefined**: Represents a variable that has been declared but has not been assigned a value. Example: `undefined`.
        */

        let name = "John"; // string

        let age = 25; // number

        let height = 19.9; // float/double

        let numberOfCars = 2; // integer (whole number without decimal point)

        let isStudent = true; // boolean

        let fruits = ["apple", "banana", "orange"]; // array

        let person = { // object (enclosed in curly brackets)
            name: "John",
            age: 25,
            isStudent: true
        };


        //Example
        person.age

        let emptyVariable = null; // null
        
        let undefinedVariable; // undefined
    </script>
</body>
</html>
