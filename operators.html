        // Arithmetic Operators

        //subtraction
        let c  = 20 - 9;
        console.log(c);

        //Muliplication
        let e  = 20 * 9;

        let f  = 20 * "9";

         //Division
        let g  = 20 / 9;
        console.log(g);

        let h  = 20 / "9";
        console.log(h);



        //Modulus
        let i  = 21 % 9; /// returns the remainder of a division
        console.log(i);


        let x = 5;

        //Addition Assignment
        x += 2; // x = x + 2

        //Subtraction assignment
        x -= 3; // x = x - 3

        //Multiplication aassignment
        x *= 4; // x = x * 4

        //Division asssignment
        x /= 2; // x = x / 2s



        //Comoparison operators
        let a = 10;
        let b = 5;

        console.log(a > b); // true // greater than
        console.log(a < b); // false  // less than
        console.log(a >= b); // true  // greater than or equal to
        console.log(a <= b); // false  // less than or equal to
        console.log(a == b); // false  // equal to
        console.log(a != b); // true  // not equal to


        //Logical Operators

        let result = true && false; // result = false // double ampersand (AND)
        console.log(result);

        let result2 = true || false; // result2 = true // double pipe (OR)
        console.log(result2);
