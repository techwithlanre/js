<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Operators</title>
</head>
<body>
    
    <script>

        // Arithmetic Operators

        //Addition

        let a = 1 + 2;
        console.log(a);

        let b = 104 + "2";
        console.log(b);


        //subtraction
        let c  = 20 - 9;
        console.log(c);

        let d  = 20 - "8";
        console.log(d);



        //Muliplication
        let e  = 20 * 9;
        console.log(e);

        let f  = 20 * "9";
        console.log(f);


         //Division
        let g  = 20 / 9;
        console.log(g);

        let h  = 20 / "9";
        console.log(h);



        //Modulus
        let i  = 21 % 9; /// returns the remainder of a division
        console.log(i);


        let x = 5;

        //Addtition Assignment
        x += 2; // x = x + 2

        //Subtraction assignment
        x -= 3; // x = x - 3

        //Multiplication aassignment
        x *= 4; // x = x * 4

        //Division asssignment
        x /= 2; // x = x / 2







    </script>
</body>
</html>
